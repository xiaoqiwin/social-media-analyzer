# Render部署配置文件
services:
  - type: web
    name: social-media-ai-server
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: QWEN_API_KEY
        sync: false  # 在Render控制台手动设置
